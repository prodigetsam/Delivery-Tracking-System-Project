<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parcel History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
</head>
<body>
<div class="services-container">
    <h1>History for {{ parcel_id }}</h1>
    <div class="service-card">
        {% if history %}
            <ul>
            {% for entry in history %}
                <li>{{ entry.update_time }}: {{ entry.status_description }}</li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No history found for this parcel.</p>
        {% endif %}
    </div>
    <br>
    <a href="{{ url_for('tracking') }}">Back to Tracking</a>
</div>
</body>
</html>
