<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Delivery Tracking System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
    <script src="{{ url_for('static', filename='mainJSscript.js') }}"></script>
</head>
<body>
    <h1>Parcel Tracking System</h1>
    <p>Welcome to the Parcel Tracking System!</p>
    <p>Please log in to access your account and track your parcels.</p>
    
    <form action="/login" method="post">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        
        <a href="{{ url_for('registration_page') }}">Don't have an account? Register here.</a><br><br>
        
        <input type="submit" value="Login">
    </form>
</body>
</html>
