<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Delivery Tracking System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
    <script src="{{ url_for('static', filename='mainJSscript.js') }}"></script>
</head>
<body>
    <div class="registration-container">
        <h1>Parcel Tracking System</h1>
        <h2>Welcome to the Parcel Tracking System!</h2>
        <p>Please fill in the form below to create an account.</p>
        
        <form action="{{ url_for('registration_page') }}" method="post" class="registration-form">        
            <div class="form-group">
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>
            
            <div class="form-group">
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>
            
            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="address_label">Primary Delivery Address:</label>
                <input type="text" id="address_label" placeholder="eg. Home, Office, School, etc." name="address_label" required>
            </div>

            <div class="form-group">
                <label for="address">Address Description:</label>
                <input type="text" id="address" name="address" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            
            <p class="registrationmessage" id="demo"></p>
            
            <button type="submit" onclick="return passwordConfirmation();" class="submit-btn">Register</button>
        </form>
        
        <p class="form-footer"><a href="{{ url_for('login_page') }}">Already have an account? Login here.</a></p>
    </div>
</body>
</html>
