<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Delivery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="profile-container">
    <h1>Request Delivery</h1>
    <p>Select from the available parcels below.</p>

    <div style="margin-bottom: 25px; text-align: left;">
        <a href="{{ url_for('parcel_services') }}">
            <i class="fas fa-arrow-left"></i> Back to Services
        </a>
    </div>

    <div class="parcel-grid">
        {% for parcel in admin_parcels %}
            <div class="parcel-card">
                <div>
                    <h3>{{ parcel.item_name }}</h3>
                    <div class="parcel-price">Price: KES {{ parcel.price }}</div>
                    <p class="parcel-desc"><h3>Description:</h3> {{ parcel.description }}</p>
                </div>
                
                <form action="/request_delivery" method="POST">
                    <input type="hidden" name="parcel_id" value="{{ parcel.id }}">
                    <button type="submit">
                        <i class="fas fa-paper-plane"></i> Request Delivery
                    </button>
                </form>
            </div>
        {% else %}
            <div style="grid-column: 1 / -1; text-align: center; padding: 20px; color: #888;">
                <p>No available parcels for delivery currently.</p>
            </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
