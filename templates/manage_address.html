<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Address</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="services-container">

    <h1>Manage Address</h1>
    <p>View or update your delivery destination below.</p>

    <div class="service-card address-card">
        
        <h3>Your Delivery Address</h3>
        
        <form action="{{ url_for('manage_address') }}" method="POST" class="address-form">
            
            <label for="address_label">Address Label</label>
            <input type="text" 
                   id="address_label" 
                   name="address_label" 
                   placeholder="e.g., Home, Velvet Suites, Office" 
                   value="{{ address.address_label if address else '' }}"
                   required>

            <label for="full_address">Full Address Details</label>
            <input type="text" 
                   id="full_address" 
                   name="full_address" 
                   placeholder="Enter the complete address street and details" 
                   value="{{ address.full_address if address else '' }}"
                   required>

            <button type="submit" class="submit-btn">
                <i class="fas fa-save"></i> Save Address Changes
            </button>

        </form>

    </div>

    <div class="back-link-container">
        <a href="{{ url_for('parcel_services') }}">
            <i class="fas fa-arrow-left"></i> Back to Parcel Services
        </a>
    </div>

</div>

</body>
</html>
