<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Parcel</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='mystyle.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="tracking-container">

    <h1>Tracking Portal</h1>

    <div class="tracking-sections" style="display: flex; justify-content: center;">

        <div class="tracking-card" style="max-width: 450px; width: 100%;">
            <i class="fas fa-search"></i>
            <h3>Track Parcel Shipment</h3>
            <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">Enter your tracking number to check the real-time status and complete history of your shipment.</p>

            <form action="{{ url_for('track_parcel') }}" method="POST">

                <label>Tracking Number</label><br>
                <input type="text"
                       name="tracking_number"
                       placeholder="Enter Tracking Number e.g., TRK-1234ABCD"
                       required><br><br>

                <button type="submit">
                    Track Journey
                </button>

            </form>
        </div>

    </div>

    <br>

    <a href="{{ url_for('user_dashboard') }}">
        Back to Dashboard
    </a>

</div>

</body>
</html>
