<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Parcel</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='mystyle.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="tracking-container">

    <h1>Tracking</h1>

    <div class="tracking-sections">

        <!-- Track Parcel -->
        <div class="tracking-card">
            <i class="fas fa-search"></i>
            <h3>Track Parcel</h3>

            <form action="{{ url_for('track_parcel') }}" method="POST">

                <label>Parcel ID</label><br>
                <input type="text"
                       name="parcel_id"
                       placeholder="Enter Parcel ID"
                       required><br><br>

                <button type="submit">
                    Track
                </button>

            </form>
        </div>

        <!-- Parcel History -->
        <div class="tracking-card">
            <i class="fas fa-history"></i>
            <h3>Parcel History</h3>

            <form action="{{ url_for('parcel_history') }}" method="POST">

                <label>Parcel ID</label><br>
                <input type="text"
                       name="parcel_id"
                       placeholder="Enter Parcel ID"
                       required><br><br>

                <button type="submit">
                    View History
                </button>

            </form>
        </div>

    </div>

    <br>

    <a href="{{ url_for('user_dashboard') }}">
        Back to Dashboard
    </a>

</div>

</body>
</html>
