<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Parcel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="tracking-container">

    <h1>Tracking Portal</h1>

    <div class="tracking-sections">

        <div class="tracking-card">
            <i class="fas fa-search"></i>
            <h3>Track Parcel Shipment</h3>
            <p class="tracking-instruction">Enter your tracking number to check the real-time status and complete history of your shipment.</p>

            <form action="{{ url_for('track_parcel') }}" method="POST" class="tracking-form">
                <label for="tracking_number">Tracking Number</label>
                <input type="text" id="tracking_number" name="tracking_number" placeholder="Enter Tracking Number e.g., TRK-1234ABCD" required>

                <button type="submit" class="submit-btn">
                    Track Journey
                </button>
            </form>
        </div>

    </div>

    <div class="back-link-container">
        <a href="{{ url_for('user_dashboard') }}">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
