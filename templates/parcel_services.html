<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Services</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='mystyle.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="services-container">

    <h1>Parcel Services</h1>

    <div class="services-sections">

        <!-- Request Delivery -->
        <div class="service-card">
            <i class="fas fa-plus-circle"></i>
            <h3>Request Delivery</h3>

            <p>Create a new parcel delivery request.</p>

            <a href="{{ url_for('request_delivery') }}">
                Open
            </a>
        </div>

        <!-- Manage Address -->
        <div class="service-card">
            <i class="fas fa-map-marker-alt"></i>
            <h3>Manage Address</h3>

            <p>Add or update your delivery addresses.</p>

            <a href="{{ url_for('manage_address') }}">
                Open
            </a>
        </div>

        <!-- My Parcels -->
        <div class="service-card">
            <i class="fas fa-box"></i>
            <h3>My Parcels</h3>

            <p>View all your current parcel requests.</p>

            <a href="{{ url_for('my_parcels') }}">
                Open
            </a>
        </div>

    </div>

    <br>

    <a href="{{ url_for('user_dashboard') }}">
        Back to Dashboard
    </a>

</div>

</body>
</html>
